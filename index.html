<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>デジタル単語帳</title>
  <style>
    :root {
      --bg:      #f0f4f8;
      --card:    #ffffff;
      --primary: #4a90d9;
      --correct: #27ae60;
      --wrong:   #e74c3c;
      --text:    #2c3e50;
      --sub:     #7f8c8d;
      --border:  #e0e6ed;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    #app { width: 100%; max-width: 480px; padding: 24px 16px 40px; }

    h1 { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 24px; color: var(--primary); }

    /* ── スクリーン切り替え ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── セクションラベル ── */
    .label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--sub);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── カード型リスト ── */
    .list {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .list-item {
      display: flex;
      align-items: center;
      padding: 15px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item input {
      width: 20px; height: 20px;
      margin-right: 14px;
      cursor: pointer;
      accent-color: var(--primary);
      flex-shrink: 0;
    }
    .list-item label { flex: 1; cursor: pointer; font-size: 1rem; }
    .count { font-size: 0.85rem; color: var(--sub); }

    /* ── 単語一覧（セットアップ） ── */
    .wl-table {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 20px;
      max-height: 300px;
      overflow-y: auto;
    }
    .wl-set-header {
      padding: 7px 16px;
      background: #eef2f7;
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--sub);
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
    }
    .wl-item {
      display: flex;
      align-items: baseline;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .wl-item:last-child { border-bottom: none; }
    .wl-en { font-weight: 700; font-size: 0.85rem; flex: 0 0 auto; min-width: 110px; max-width: 160px; }
    .wl-ja { font-size: 0.83rem; color: var(--sub); flex: 1; }

    /* ── ボタン ── */
    .btn {
      display: block; width: 100%;
      padding: 16px;
      border: none; border-radius: 14px;
      font-size: 1.05rem; font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(0.97); opacity: .85; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-correct { background: var(--correct); color: #fff; }
    .btn-wrong   { background: var(--wrong);   color: #fff; }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { flex: 1; }

    /* ── 前へ / 次へ ── */
    .nav-row { display: flex; gap: 10px; margin-top: 10px; }
    .btn-nav {
      flex: 1;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-nav:not(:disabled):active { transform: scale(0.97); background: var(--bg); }
    .btn-nav:disabled { opacity: 0.3; cursor: default; }

    /* ── 進捗 ── */
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progress-text { font-size: 0.9rem; color: var(--sub); font-weight: 600; }
    .badge {
      font-size: 0.8rem;
      background: #e8f0fe;
      color: var(--primary);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .bar {
      height: 6px; background: var(--border);
      border-radius: 3px; margin-bottom: 22px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; background: var(--primary);
      border-radius: 3px; transition: width .4s ease;
    }

    /* ── 単語カード ── */
    .word-card {
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--border);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 18px;
    }
    .word-card.answered { cursor: default; }
    .q-main  { font-size: 1.6rem; font-weight: 700; line-height: 1.4; }
    .q-kana  { font-size: 1rem; color: var(--sub); margin-top: 8px; }
    .q-hint  { font-size: 0.9rem; color: var(--sub); margin-top: 20px; }
    .divider {
      width: 100%; border: none;
      border-top: 1px solid var(--border);
      margin: 22px 0;
    }
    .a-main { font-size: 1.25rem; font-weight: 700; color: var(--correct); }
    .a-kana { font-size: 0.95rem; color: var(--sub); margin-top: 6px; }
    .answer-area { width: 100%; }

    /* ── 回答済みスタンプ ── */
    .ans-stamp {
      display: inline-block;
      margin-top: 14px;
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 0.88rem;
      font-weight: 700;
    }
    .ans-stamp.ok { background: #e8f8ee; color: var(--correct); border: 1.5px solid var(--correct); }
    .ans-stamp.ng { background: #fef0f0; color: var(--wrong);   border: 1.5px solid var(--wrong); }

    /* ── クイズナビ ── */
    .quiz-nav {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .btn-home {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--sub);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 6px 12px;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-home:hover { background: var(--border); color: var(--text); }
    .btn-home:active { transform: scale(0.96); }

    /* ── 類似単語 ── */
    .similar-box {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      text-align: left;
    }
    .similar-label {
      font-size: 0.76rem;
      font-weight: 700;
      color: #e67e22;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .similar-item {
      background: #fff8f0;
      border: 1px solid #fde8cc;
      border-radius: 10px;
      padding: 9px 12px;
      margin-bottom: 6px;
    }
    .similar-item:last-child { margin-bottom: 0; }
    .si-main { font-weight: 700; font-size: 0.9rem; }
    .si-kana { font-size: 0.78rem; color: var(--sub); }
    .si-sub  { font-size: 0.85rem; color: var(--text); margin-top: 2px; }

    /* ── 結果 ── */
    .result-box {
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--border);
      text-align: center;
      padding: 32px 24px;
      margin-bottom: 20px;
    }
    .score-num   { font-size: 3.2rem; font-weight: 800; color: var(--primary); }
    .score-pct   { font-size: 1rem; color: var(--sub); margin-top: 4px; }
    .score-msg   { font-size: 1.15rem; font-weight: 700; margin-top: 16px; }
    .wrong-box {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .wrong-header {
      padding: 12px 16px;
      background: #fff5f5;
      color: var(--wrong);
      font-weight: 700;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    .wrong-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .wrong-item:last-child { border-bottom: none; }
    .wi-en   { font-weight: 700; font-size: 0.95rem; }
    .wi-kana { font-size: 0.82rem; color: var(--sub); }
    .wi-ja   { font-size: 0.9rem; color: var(--sub); margin-top: 2px; }
    .wi-pos  { font-size: 0.75rem; color: var(--primary); background: #e8f0fe; display: inline-block; padding: 2px 8px; border-radius: 12px; margin-top: 4px; font-weight: 600; }

    /* ── 品詞バッジ ── */
    .pos-badge {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 700;
      color: #5f6b8b;
      background: #eef2fb;
      border: 1px solid #c8d4f0;
      padding: 3px 12px;
      border-radius: 20px;
      margin-top: 10px;
      letter-spacing: 0.04em;
    }
    .pos-badge:empty { display: none; }
  </style>
</head>
<body>
<div id="app">

  <!-- ① セットアップ画面 -->
  <div id="s-setup" class="screen active">
    <h1>📖 デジタル単語帳</h1>
    <div class="label">出題セット</div>
    <div class="list" id="set-list">
      <div class="list-item"><label>読み込み中...</label></div>
    </div>
    <div id="word-list-area" style="display:none">
      <div class="label">単語一覧</div>
      <div class="wl-table" id="word-list-table"></div>
    </div>
    <div class="label">出題方向</div>
    <div class="list">
      <div class="list-item" onclick="pickDir(this)">
        <input type="radio" name="dir" id="d1" value="1">
        <label for="d1">英語 → 日本語</label>
      </div>
      <div class="list-item" onclick="pickDir(this)">
        <input type="radio" name="dir" id="d2" value="2">
        <label for="d2">日本語 → 英語</label>
      </div>
      <div class="list-item" onclick="pickDir(this)">
        <input type="radio" name="dir" id="d3" value="3" checked>
        <label for="d3">ランダム（どちらも出る）</label>
      </div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">スタート</button>
  </div>

  <!-- ② クイズ画面 -->
  <div id="s-quiz" class="screen">
    <div class="quiz-nav">
      <button class="btn-home" onclick="goSetup()">← ホーム</button>
    </div>
    <div class="progress-row">
      <span class="progress-text" id="prog-text">1 / 30</span>
      <span class="badge" id="card-set"></span>
    </div>
    <div class="bar"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>

    <div class="word-card" id="word-card" onclick="reveal()">
      <div class="q-main" id="q-main"></div>
      <div class="q-kana" id="q-kana"></div>
      <div id="q-pos" class="pos-badge"></div>
      <div class="q-hint" id="q-hint">タップして答えを確認</div>
      <div class="answer-area" id="answer-area" style="display:none">
        <hr class="divider">
        <div class="a-main" id="a-main"></div>
        <div class="a-kana" id="a-kana"></div>
        <div id="ans-stamp" style="display:none"></div>
        <div id="similar-area" style="display:none" class="similar-box">
          <div class="similar-label">⚠ 混同しやすい単語</div>
          <div id="similar-items"></div>
        </div>
      </div>
    </div>

    <div class="btn-row" id="ans-btns" style="display:none">
      <button class="btn btn-wrong"   onclick="mark(false)">✗ 不正解</button>
      <button class="btn btn-correct" onclick="mark(true)">○ 正解</button>
    </div>
    <div class="nav-row">
      <button class="btn-nav" id="btn-prev" onclick="prevCard()" disabled>← 前へ</button>
      <button class="btn-nav" id="btn-next" onclick="nextCard()" disabled>次へ →</button>
    </div>
  </div>

  <!-- ③ 結果画面 -->
  <div id="s-result" class="screen">
    <h1>📖 デジタル単語帳</h1>
    <div class="result-box">
      <div class="score-num" id="r-score"></div>
      <div class="score-pct"  id="r-pct"></div>
      <div class="score-msg"  id="r-msg"></div>
    </div>
    <div class="wrong-box" id="wrong-box" style="display:none">
      <div class="wrong-header">📝 要復習リスト</div>
      <div id="wrong-items"></div>
    </div>
    <div class="btn-row" style="margin-bottom:12px">
      <button class="btn btn-outline" onclick="goSetup()">最初から</button>
      <button class="btn btn-primary" id="retry-btn" onclick="retryWrong()" style="display:none">
        間違えた問題だけ
      </button>
    </div>
  </div>

</div>
<script>
// ── 状態 ─────────────────────────────────────────────────
const S = {
  sets: {},       // { name: [word, ...] }
  deck: [],
  cur:  0,
  ok:   0,
  ng:   [],
  results: [],    // null | true | false (各カードの回答状態)
  dir:  '3',
  done: false,
};

// ── CSV 読み込み ──────────────────────────────────────────
function parseCSV(name, text) {
  return text.trim().split('\n').slice(1)
    .filter(l => l.trim())
    .map(l => {
      const i1 = l.indexOf(','), i2 = l.indexOf(',', i1 + 1), i3 = l.indexOf(',', i2 + 1);
      return {
        set:  name,
        en:   l.slice(0, i1).trim(),
        kana: l.slice(i1 + 1, i2).trim(),
        ja:   i3 >= 0 ? l.slice(i2 + 1, i3).trim() : l.slice(i2 + 1).trim(),
        pos:  i3 >= 0 ? l.slice(i3 + 1).trim() : '',
      };
    });
}

async function init() {
  const manifest = await fetch('words/manifest.json').then(r => r.json());
  const listEl = document.getElementById('set-list');
  listEl.innerHTML = '';

  for (const name of manifest) {
    const words = parseCSV(name, await fetch(`words/${name}.csv`).then(r => r.text()));
    S.sets[name] = words;

    const item = document.createElement('div');
    item.className = 'list-item';
    item.innerHTML = `
      <input type="checkbox" id="cb-${name}" value="${name}" checked>
      <label for="cb-${name}">${name}</label>
      <span class="count">${words.length}語</span>`;
    item.addEventListener('click', e => {
      if (e.target.tagName !== 'INPUT') {
        const cb = item.querySelector('input');
        cb.checked = !cb.checked;
      }
      updateWordList();
    });
    listEl.appendChild(item);
  }
  updateWordList();
}

// ── 単語一覧（セットアップ） ──────────────────────────────
function updateWordList() {
  const checked = [...document.querySelectorAll('#set-list input:checked')];
  const area  = document.getElementById('word-list-area');
  const table = document.getElementById('word-list-table');
  table.innerHTML = '';

  if (!checked.length) { area.style.display = 'none'; return; }

  checked.forEach(cb => {
    const words = S.sets[cb.value];
    if (!words) return;
    const header = document.createElement('div');
    header.className = 'wl-set-header';
    header.textContent = cb.value;
    table.appendChild(header);
    words.forEach(w => {
      const el = document.createElement('div');
      el.className = 'wl-item';
      el.innerHTML = `<span class="wl-en">${w.en}</span><span class="wl-ja">${w.ja}</span>`;
      table.appendChild(el);
    });
  });
  area.style.display = '';
}

// ── セットアップ ──────────────────────────────────────────
function pickDir(el) { el.querySelector('input').checked = true; }

function startQuiz() {
  const checked = [...document.querySelectorAll('#set-list input:checked')];
  if (!checked.length) { alert('セットを1つ以上選んでね！'); return; }

  S.dir  = document.querySelector('input[name=dir]:checked').value;
  S.deck = [];
  // シャローコピーで _d をリセット
  checked.forEach(cb => S.deck.push(...S.sets[cb.value].map(w => ({...w}))));
  shuffle(S.deck);
  S.cur = 0; S.ok = 0; S.ng = [];
  S.results = new Array(S.deck.length).fill(null);

  show('quiz');
  renderCard();
}

// ── クイズ ────────────────────────────────────────────────
function renderCard() {
  const w     = S.deck[S.cur];
  const total = S.deck.length;
  const alreadyAnswered = S.results[S.cur] !== null;
  S.done = alreadyAnswered;

  document.getElementById('prog-text').textContent = `${S.cur + 1} / ${total}`;
  document.getElementById('card-set').textContent  = w.set;
  document.getElementById('bar-fill').style.width  = `${(S.cur / total) * 100}%`;

  // 出題方向はカードごとに初回のみ決定（前へ戻っても変わらない）
  if (!w._d) {
    w._d = S.dir === '3' ? (Math.random() < .5 ? 'en' : 'ja') : (S.dir === '1' ? 'en' : 'ja');
  }
  const d = w._d;

  document.getElementById('q-main').textContent = d === 'en' ? w.en   : w.ja;
  document.getElementById('q-kana').textContent = d === 'en' ? w.kana : '';
  document.getElementById('q-pos').textContent  = w.pos || '';
  document.getElementById('a-main').textContent = d === 'en' ? w.ja   : w.en;
  document.getElementById('a-kana').textContent = d === 'en' ? ''     : `読み: ${w.kana}`;

  const card = document.getElementById('word-card');

  if (alreadyAnswered) {
    // 回答済み：答えとスタンプを表示、採点ボタンは非表示
    document.getElementById('q-hint').style.display       = 'none';
    document.getElementById('answer-area').style.display  = '';
    document.getElementById('ans-btns').style.display     = 'none';
    document.getElementById('similar-area').style.display = 'none';
    card.classList.add('answered');
    renderSimilar(w);
    renderStamp(S.results[S.cur]);
  } else {
    document.getElementById('q-hint').style.display       = '';
    document.getElementById('answer-area').style.display  = 'none';
    document.getElementById('ans-btns').style.display     = 'none';
    document.getElementById('similar-area').style.display = 'none';
    document.getElementById('ans-stamp').style.display    = 'none';
    card.classList.remove('answered');
  }

  updateNavBtns();
}

function renderStamp(result) {
  const el = document.getElementById('ans-stamp');
  el.textContent = result ? '○ 正解' : '✗ 不正解';
  el.className = 'ans-stamp ' + (result ? 'ok' : 'ng');
  el.style.display = '';
}

function updateNavBtns() {
  document.getElementById('btn-prev').disabled = (S.cur === 0);
  document.getElementById('btn-next').disabled = (S.cur === S.deck.length - 1);
}

function prevCard() {
  if (S.cur > 0) { S.cur--; renderCard(); }
}

function nextCard() {
  if (S.cur < S.deck.length - 1) { S.cur++; renderCard(); }
}

function reveal() {
  if (S.done) return;
  S.done = true;
  document.getElementById('q-hint').style.display      = 'none';
  document.getElementById('answer-area').style.display = '';
  document.getElementById('ans-btns').style.display    = '';
  document.getElementById('word-card').classList.add('answered');
  renderSimilar(S.deck[S.cur]);
}

function mark(ok) {
  if (ok) S.ok++;
  else     S.ng.push(S.deck[S.cur]);
  S.results[S.cur] = ok;
  S.cur++;
  if (S.cur < S.deck.length) renderCard();
  else                        showResult();
}

// ── 結果 ──────────────────────────────────────────────────
function showResult() {
  const total = S.deck.length;
  const pct   = Math.round(S.ok / total * 100);
  document.getElementById('r-score').textContent = `${S.ok} / ${total}`;
  document.getElementById('r-pct').textContent   = `${pct}%`;
  document.getElementById('r-msg').textContent   =
    pct === 100 ? '🎉 満点！完璧だよ！' :
    pct >= 80   ? '👏 よくできました！' :
    pct >= 60   ? '💪 半分以上正解！'   : '📖 もう一度チャレンジしよう！';

  const wrongBox   = document.getElementById('wrong-box');
  const wrongItems = document.getElementById('wrong-items');
  const retryBtn   = document.getElementById('retry-btn');
  wrongItems.innerHTML = '';

  if (S.ng.length) {
    S.ng.forEach(w => {
      const el = document.createElement('div');
      el.className = 'wrong-item';
      el.innerHTML = `<div class="wi-en">${w.en}</div><div class="wi-kana">${w.kana}</div><div class="wi-ja">${w.ja}</div>${w.pos ? `<div class="wi-pos">${w.pos}</div>` : ''}`;
      wrongItems.appendChild(el);
    });
    wrongBox.style.display = '';
    retryBtn.style.display = '';
  } else {
    wrongBox.style.display = 'none';
    retryBtn.style.display = 'none';
  }
  show('result');
}

function retryWrong() {
  S.deck = [...S.ng].map(w => ({...w}));
  shuffle(S.deck);
  S.cur = 0; S.ok = 0; S.ng = [];
  S.results = new Array(S.deck.length).fill(null);
  show('quiz'); renderCard();
}

function goSetup() { show('setup'); }

// ── 類似単語 ──────────────────────────────────────────────
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, (_, i) => Array.from({length: n + 1}, (_, j) => i || j));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function enSimilarity(a, b) {
  a = a.toLowerCase(); b = b.toLowerCase();
  if (a === b) return 0;
  const dist = levenshtein(a, b);
  const maxLen = Math.max(a.length, b.length);
  const ratio = 1 - dist / maxLen;
  let pre = 0;
  while (pre < a.length && pre < b.length && a[pre] === b[pre]) pre++;
  return ratio + (pre >= 4 ? 0.15 : 0);
}

function jaSimilarity(a, b) {
  if (a === b) return 0;
  const ignore = new Set('するなのをはがにでもとやへからまでてしたけどよねだわいうこもれのー〜、。');
  const charsA = new Set([...a].filter(c => !ignore.has(c)));
  const charsB = new Set([...b].filter(c => !ignore.has(c)));
  if (charsA.size === 0 || charsB.size === 0) return 0;
  const shared = [...charsA].filter(c => charsB.has(c)).length;
  return shared / Math.max(charsA.size, charsB.size);
}

function getSimilarWords(current, pool, maxCount = 2) {
  const d = current._d;
  return pool
    .filter(w => w !== current)
    .map(w => ({
      w,
      score: d === 'en'
        ? enSimilarity(current.en, w.en)
        : jaSimilarity(current.ja, w.ja),
    }))
    .filter(x => x.score >= 0.55)
    .sort((a, b) => b.score - a.score)
    .slice(0, maxCount)
    .map(x => x.w);
}

function renderSimilar(word) {
  const similar = getSimilarWords(word, S.deck);
  const area = document.getElementById('similar-area');
  const list = document.getElementById('similar-items');
  list.innerHTML = '';
  if (!similar.length) { area.style.display = 'none'; return; }

  similar.forEach(w => {
    const el = document.createElement('div');
    el.className = 'similar-item';
    if (word._d === 'en') {
      el.innerHTML =
        `<div class="si-main">${w.en}</div>` +
        `<div class="si-kana">${w.kana}</div>` +
        `<div class="si-sub">${w.ja}</div>`;
    } else {
      el.innerHTML =
        `<div class="si-main">${w.ja}</div>` +
        `<div class="si-sub">${w.en} <span class="si-kana">[${w.kana}]</span></div>`;
    }
    list.appendChild(el);
  });
  area.style.display = '';
}

// ── ユーティリティ ────────────────────────────────────────
function show(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`s-${name}`).classList.add('active');
}
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

init();
